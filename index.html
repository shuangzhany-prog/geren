<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSZ | 个人作品集</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1a1a2e;
  --text-primary: #ffffff; --text-secondary: rgba(255,255,255,0.7); --text-muted: rgba(255,255,255,0.4);
  --accent-primary: #00f5ff; --accent-secondary: #bf00ff; --accent-tertiary: #ff00e5;
  --glass-bg: rgba(255,255,255,0.05); --glass-border: rgba(255,255,255,0.1);
  --font-display: 'Space Grotesk', sans-serif; --font-primary: 'Noto Sans SC', sans-serif;
  --transition: 0.3s ease;
}
[data-theme="light"] {
  --bg-primary: #ffffff; --bg-secondary: #f5f5f7; --bg-tertiary: #e8e8ed;
  --text-primary: #1d1d1f; --text-secondary: rgba(29,29,31,0.7); --text-muted: rgba(29,29,31,0.4);
  --accent-primary: #0066cc; --accent-secondary: #5856d6; --accent-tertiary: #ff2d55;
  --glass-bg: rgba(255,255,255,0.8); --glass-border: rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-primary); background: var(--bg-primary); color: var(--text-primary); overflow-x:hidden; transition: background 0.5s, color 0.5s; cursor:none; }
#cursor-glow { position:fixed; width:400px; height:400px; background:radial-gradient(circle,rgba(0,245,255,0.08) 0%,transparent 70%); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
#cursor-dot { position:fixed; width:8px; height:8px; background:var(--accent-primary); border-radius:50%; pointer-events:none; z-index:10000; transform:translate(-50%,-50%); }
#preloader { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); display:flex; align-items:center; justify-content:center; z-index:100000; transition:opacity 0.5s; }
#preloader.loaded { opacity:0; visibility:hidden; }
.loader-content { text-align:center; }
.logo-loader .letter { display:inline-block; font-family:var(--font-display); font-size:48px; font-weight:700; background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:letterFade 0.5s ease forwards; opacity:0; }
.logo-loader .letter:nth-child(1){animation-delay:0.1s;} .logo-loader .letter:nth-child(2){animation-delay:0.2s;} .logo-loader .letter:nth-child(3){animation-delay:0.3s;}
@keyframes letterFade { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.loader-bar { width:200px; height:2px; background:var(--glass-border); border-radius:2px; overflow:hidden; margin:20px auto 0; }
.loader-progress { width:0%; height:100%; background:linear-gradient(90deg,var(--accent-primary),var(--accent-secondary)); animation:loadProgress 1.5s ease forwards; }
@keyframes loadProgress { to{width:100%} }
.glass-nav { position:fixed; top:0; left:0; width:100%; padding:20px 0; z-index:1000; transition:all 0.3s; }
.glass-nav.scrolled { background:var(--glass-bg); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); }
.nav-container { max-width:1200px; margin:0 auto; padding:0 40px; display:flex; align-items:center; justify-content:space-between; }
.nav-logo { text-decoration:none; }
.nav-links { display:flex; gap:40px; }
.nav-link { text-decoration:none; color:var(--text-secondary); font-size:14px; font-weight:500; position:relative; padding:5px 0; transition:color var(--transition); }
.nav-link.active, .nav-link:hover { color:var(--text-primary); }
.nav-indicator { position:absolute; bottom:-2px; left:0; width:0; height:2px; background:linear-gradient(90deg,var(--accent-primary),var(--accent-secondary)); transition:width var(--transition); }
.nav-link:hover .nav-indicator, .nav-link.active .nav-indicator { width:100%; }
.nav-controls { display:flex; gap:15px; }
.control-btn { background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-primary); width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all var(--transition); }
.control-btn:hover { background:var(--accent-primary); color:var(--bg-primary); }
.section { min-height:100vh; display:none; position:relative; overflow:hidden; }
.section.active { display:flex; }
.section-home { align-items:center; justify-content:center; position:relative; }
.floating-shapes { position:absolute; width:100%; height:100%; top:0; left:0; z-index:1; pointer-events:none; }
.shape { position:absolute; border-radius:50%; opacity:0.25; filter:blur(90px); }
.shape-1 { width:400px; height:400px; background:var(--accent-primary); top:10%; left:8%; animation:float1 20s infinite; }
.shape-2 { width:300px; height:300px; background:var(--accent-secondary); top:60%; right:12%; animation:float2 15s infinite; }
.shape-3 { width:350px; height:350px; background:var(--accent-tertiary); bottom:8%; left:30%; animation:float3 18s infinite; }
@keyframes float1 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-30px)} 66%{transform:translate(-20px,20px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(-30px,30px)} 66%{transform:translate(20px,-20px)} }
@keyframes float3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,20px)} 66%{transform:translate(-30px,-10px)} }
.hero-content { position:relative; z-index:2; text-align:center; padding:0 40px; }
.hero-name { font-family:var(--font-display); font-size:96px; font-weight:700; background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary),var(--accent-tertiary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; letter-spacing:-2px; }
.hero-desc { font-size:18px; color:var(--text-secondary); max-width:600px; margin:0 auto 40px; line-height:1.6; }
.hero-cta { display:flex; gap:20px; justify-content:center; }
.btn { padding:15px 30px; border-radius:12px; font-size:14px; font-weight:600; text-decoration:none; display:inline-flex; align-items:center; gap:10px; transition:all var(--transition); cursor:pointer; border:none; }
.btn-primary { background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary)); color:var(--bg-primary); }
.btn-primary:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,245,255,0.3); }
.btn-ghost { background:var(--glass-bg); color:var(--text-primary); border:1px solid var(--glass-border); }
.btn-ghost:hover { background:var(--accent-primary); color:var(--bg-primary); }
.section { padding:100px 0; }
.section-container { max-width:1200px; margin:0 auto; padding:0 40px; }
.section-tag { font-size:12px; text-transform:uppercase; letter-spacing:3px; color:var(--accent-primary); margin-bottom:10px; }
.section-title { font-family:var(--font-display); font-size:48px; font-weight:700; margin-bottom:15px; }
.section-subtitle { color:var(--text-secondary); font-size:16px; margin-bottom:40px; text-align:center; }
.timeline { position:relative; padding-left:40px; max-width:800px; margin:0 auto; }
.timeline::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:linear-gradient(to bottom,var(--accent-primary),var(--accent-secondary)); }
.timeline-item { position:relative; margin-bottom:60px; padding-left:40px; opacity:0; transform:translateY(30px); transition:all 0.6s ease; }
.timeline-item.visible { opacity:1; transform:translateY(0); }
.timeline-item::before { content:''; position:absolute; left:-44px; top:5px; width:10px; height:10px; background:var(--accent-primary); border-radius:50%; border:2px solid var(--bg-secondary); }
.timeline-date { font-size:14px; color:var(--accent-primary); font-weight:600; margin-bottom:5px; }
.timeline-title { font-family:var(--font-display); font-size:24px; font-weight:600; margin-bottom:5px; }
.timeline-company { font-size:16px; color:var(--accent-secondary); margin-bottom:15px; }
.timeline-desc { font-size:15px; color:var(--text-secondary); line-height:1.8; }
.skills-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:30px; max-width:1000px; margin:0 auto; }
.skill-card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:20px; padding:30px; transition:all var(--transition); cursor:pointer; opacity:0; transform:translateY(30px); }
.skill-card.visible { opacity:1; transform:translateY(0); }
.skill-card:hover { transform:translateY(-10px); border-color:var(--accent-primary); box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.skill-icon { width:60px; height:60px; background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary)); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:20px; }
.skill-name { font-family:var(--font-display); font-size:20px; font-weight:600; margin-bottom:10px; }
.skill-desc { font-size:14px; color:var(--text-secondary); line-height:1.6; margin-bottom:15px; }
.skill-tags { display:flex; flex-wrap:wrap; gap:8px; }
.skill-tag { background:var(--bg-tertiary); color:var(--text-secondary); padding:4px 12px; border-radius:20px; font-size:12px; }
.contact-content { display:grid; grid-template-columns:1fr 1fr; gap:60px; max-width:1000px; margin:0 auto; }
.info-card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:20px; padding:25px; display:flex; gap:20px; align-items:center; transition:all var(--transition); }
.info-card:hover { transform:translateX(10px); border-color:var(--accent-primary); }
.info-icon { width:50px; height:50px; background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary)); border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--bg-primary); font-size:20px; }
.info-details h3 { font-size:14px; color:var(--text-muted); margin-bottom:5px; }
.info-details p { font-size:16px; font-weight:500; }
.map-container { width:100%; height:400px; background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:20px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; }
.map-text { color:var(--text-muted); font-size:14px; }
footer { padding:40px 0; background:var(--bg-secondary); border-top:1px solid var(--glass-border); }
.footer-content { max-width:1200px; margin:0 auto; padding:0 40px; display:flex; align-items:center; justify-content:space-between; font-size:14px; color:var(--text-muted); }
.fluid-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; background:linear-gradient(45deg,var(--accent-primary),transparent,var(--accent-secondary),transparent,var(--accent-tertiary)); background-size:400% 400%; animation:fluidGradient 15s ease infinite; opacity:0.03; }
@keyframes fluidGradient { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
[data-animate] { opacity:0; transform:translateY(30px); transition:all 0.6s ease; }
[data-animate].visible { opacity:1; transform:translateY(0); }
@media (max-width:768px) { .nav-links { display:none; } .hero-name { font-size:48px; } .contact-content { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="fluid-bg"></div>
<div id="preloader"><div class="loader-content"><div class="logo-loader"><span class="letter">Y</span><span class="letter">S</span><span class="letter">Z</span></div><div class="loader-bar"><div class="loader-progress"></div></div></div></div>
<div id="cursor-glow"></div>
<div id="cursor-dot"></div>
<nav id="navbar" class="glass-nav">
<div class="nav-container">
<a href="#home" class="nav-logo" data-magnetic>
<svg class="logo-svg" viewBox="0 0 200 60" width="120" height="36">
<defs><linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" /><stop offset="50%" style="stop-color:#bf00ff;stop-opacity:1" /><stop offset="100%" style="stop-color:#ff00e5;stop-opacity:1" />
</linearGradient></defs>
<text x="10" y="45" font-family="Space Grotesk" font-size="42" font-weight="700" fill="url(#logoGradient)">YSZ</text>

</div>

<script>
const i18n = {
  'zh-CN': {
    'nav.home': '家', 'nav.experience': '经历', 'nav.skills': '技能', 'nav.contact': '联系',
    'home.description': '专注于视觉设计、品牌塑造与数字体验创作',
    'home.cta.explore': '探索更多', 'home.cta.contact': '联系我',
    'experience.tag': '职业生涯', 'experience.title': '工作经历', 'experience.subtitle': '每一步都铸就了今天的我',
    'skills.tag': '专业能力', 'skills.title': '技能图谱', 'skills.subtitle': '多领域跨界，持续精进',
    'contact.tag': '保持联系', 'contact.title': '找到我', 'contact.subtitle': '期待与您的合作交流',
    'contact.address.label': '地址', 'contact.address.value': '天津市',
    'contact.email.label': '邮箱', 'contact.phone.label': '电话',
    'footer.text': '© 2026 YSZ. 用创意点亮数字世界'
  },
  'en': {
    'nav.home': 'Home', 'nav.experience': 'Experience', 'nav.skills': 'Skills', 'nav.contact': 'Contact',
    'home.description': 'Focused on visual design, branding and digital experience creation',
    'home.cta.explore': 'Explore More', 'home.cta.contact': 'Contact Me',
    'experience.tag': 'Career', 'experience.title': 'Work Experience', 'experience.subtitle': 'Every step has shaped who I am today',
    'skills.tag': 'Expertise', 'skills.title': 'Skill Map', 'skills.subtitle': 'Cross-domain expertise, continuous improvement',
    'contact.tag': 'Get in Touch', 'contact.title': 'Find Me', 'contact.subtitle': 'Looking forward to collaborating with you',
    'contact.address.label': 'Address', 'contact.address.value': 'Tianjin, China',
    'contact.email.label': 'Email', 'contact.phone.label': 'Phone',
    'footer.text': '© 2026 YSZ. Lighting up the digital world with creativity'
  }
};
let currentLang = localStorage.getItem('lang') || 'zh-CN';
function updateLanguage(lang) {
  currentLang = lang; localStorage.setItem('lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang] && i18n[lang][key]) el.textContent = i18n[lang][key];
  });
  document.documentElement.lang = lang === 'zh-CN' ? 'zh-CN' : 'en';
  const langBtn = document.getElementById('langToggle');
  if (langBtn) langBtn.querySelector('.lang-text').textContent = lang === 'zh-CN' ? 'EN' : '中文';
}
document.addEventListener('DOMContentLoaded', () => {
  updateLanguage(currentLang);
  const langBtn = document.getElementById('langToggle');
  if (langBtn) langBtn.addEventListener('click', () => updateLanguage(currentLang === 'zh-CN' ? 'en' : 'zh-CN'));

  const toggle = document.getElementById('themeToggle');
  const root = document.documentElement;
  const saved = localStorage.getItem('theme') || 'dark';
  root.setAttribute('data-theme', saved);
  if (toggle) toggle.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  const glow = document.getElementById('cursor-glow');
  const dot = document.getElementById('cursor-dot');
  if (glow && dot) {
    let mx=0, my=0, gx=0, gy=0, dx=0, dy=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    function anim() {
      gx += (mx-gx)*0.08; gy += (my-gy)*0.08;
      dx += (mx-dx)*0.5; dy += (my-dy)*0.5;
      glow.style.left = gx+'px'; glow.style.top = gy+'px';
      dot.style.left = dx+'px'; dot.style.top = dy+'px';
      requestAnimationFrame(anim);
    }
    anim();
  }

  const canvas = document.getElementById('particleCanvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const particles = [];
    for (let i=0;i<80;i++) {
      particles.push({
        x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5,
        r: Math.random()*2+1, o: Math.random()*0.5+0.2
      });
    }
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const color = getComputedStyle(document.documentElement).getPropertyValue('--accent-primary').trim() || '#00f5ff';
      ctx.fillStyle = color;
      particles.forEach(p => {
        ctx.globalAlpha = p.o;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
        p.x += p.vx; p.y += p.vy;
        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold:0.1});
  document.querySelectorAll('.timeline-item, .skill-card, [data-animate]').forEach(el => observer.observe(el));
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const sec = document.getElementById(link.dataset.section);
      if(sec) sec.classList.add('active');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
    });
  });
    const div = document.createElement('div');
    div.className = 'timeline-item';
    div.style.animationDelay = i * 0.2 + 's';
    div.innerHTML = '<div class="timeline-date">' + exp.date + '</div><h3 class="timeline-title">' + exp.title + '</h3><div class="timeline-company">' + exp.company + '</div><p class="timeline-desc">' + exp.desc + '</p>';
    timeline.appendChild(div);
  });
  const skills = [
    {icon:'📊', name:'办公软件', desc:'精通 Word、Excel、PowerPoint 等办公软件，擅长数据分析与可视化报告。', tags:['Word','Excel','PPT','数据分析']},
    {icon:'🎬', name:'视频剪辑', desc:'熟练使用 Premiere Pro、After Effects 等工具，能独立完成宣传片、短视频制作。', tags:['PR','AE','剪映','达芬奇']},

  ];
  const grid = document.getElementById('skillsGrid');
  if(grid) skills.forEach((skill,i) => {
    const card = document.createElement('div');
    card.className = 'skill-card';
    card.style.animationDelay = i * 0.15 + 's';
    card.innerHTML = '<div class="skill-icon">' + skill.icon + '</div><h3 class="skill-name">' + skill.name + '</h3><p class="skill-desc">' + skill.desc + '</p><div class="skill-tags">' + skill.tags.map(t => '<span class="skill-tag">' + t + '</span>').join('') + '</div>';
    grid.appendChild(card);
  });
  setTimeout(() => {
    const pre = document.getElementById('preloader');
    if(pre) { pre.classList.add('loaded'); setTimeout(() => pre.style.display = 'none', 600); }
  }, 1800);
  window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    if(navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
  });
});
